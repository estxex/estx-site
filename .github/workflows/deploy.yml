name: 🚀 Deploy estx.exchange

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-production:
    name: 🟢 Production → estx.exchange
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📂 FTP Deploy → production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 60000
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            README.md
            SETUP-GUIDE.md
            CLAUDE.md
            screenshot.mjs

  deploy-staging:
    name: 🟡 Staging → stage.estx.exchange
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📂 FTP Deploy → staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 60000
          server-dir: /stage/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            README.md
            SETUP-GUIDE.md
            CLAUDE.md
            screenshot.mjs
